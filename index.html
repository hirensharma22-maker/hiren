<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="utf-8">
<title>Bapu AR Voice</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
.btn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:18px 35px;
font-size:20px;
border-radius:40px;
border:none;
background:#4CAF50;
color:white;
font-weight:bold;
}
</style>

</head>

<body style="margin:0;overflow:hidden;">

<button class="btn" onclick="playVoice()">🎤 ગાંધીજીનો સંદેશ સાંભળો</button>

<a-scene embedded arjs="trackingMethod: best; sourceType: webcam;">

<a-assets>

<a-asset-item 
id="gandhi-model"
src="https://cdn.glitch.global/331a9829-17d4-42f5-93df-5c5f850e029c/Gandhi_Bust.glb">
</a-asset-item>

<audio id="gandhiVoice"
src="gandhi-message.mp3"
preload="auto">
</audio>

</a-assets>

<a-marker preset="hiro">

<a-entity
gltf-model="#gandhi-model"
scale="0.5 0.5 0.5"
position="0 0.3 0"
rotation="0 180 0">
</a-entity>

<a-text
value="સત્ય અને અહિંસા મારો માર્ગ છે"
color="yellow"
align="center"
position="0 1.3 0"
rotation="-90 0 0"
width="5">
</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

function playVoice(){
var audio=document.getElementById("gandhiVoice");
audio.play();
}

</script>

</body>
</html>
