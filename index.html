<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gandhi AR</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif;}
#info{
position:fixed;
bottom:10px;
left:10px;
background:white;
padding:8px 12px;
border-radius:8px;
}
</style>
</head>
<body>

<a-scene embedded arjs="trackingMethod: best; sourceType: webcam;">

<a-marker preset="hiro">

<a-plane src="gandhi.jpg"
position="0 0.5 0"
rotation="-90 0 0"
width="1.2"
height="1.4">
</a-plane>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<div id="info">Scan the HIRO marker to see Gandhi.</div>

</body>
</html>
